  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #FAFAF8; --off-white: #F2F0EB; --ink: #1A1A18;
      --ink-light: #4A4A46; --ink-faint: #9A9A94;
      --sage-pale: #D6E3D4; --teal: #3D7A7A; --teal-light: #5A9E9E;
      --accent: #C8A882; --border: #E0DDD6; --hover-bg: #EEF5EE;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--ink); overflow-x: hidden; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 60px; background: rgba(250,250,248,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--ink); text-decoration: none; }
    .nav-logo span { color: var(--teal); }
    .nav-links { display: flex; gap: 30px; list-style: none; }
    .nav-links a { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--teal); }
    .nav-cta { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white); background: var(--teal); border: none; padding: 9px 20px; cursor: pointer; transition: background 0.2s; text-decoration: none; }
    .nav-cta:hover { background: var(--teal-light); }

    /* BREADCRUMB */
    .breadcrumb { padding: 80px 64px 0; display: flex; align-items: center; gap: 8px; }
    .breadcrumb a { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); text-decoration: none; transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--teal); }
    .breadcrumb-sep { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--border); }
    .breadcrumb-current { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal); }

    /* BRAND HERO */
    .brand-hero { padding: 40px 64px 64px; background: var(--off-white); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
    .brand-hero-grid { position: absolute; inset: 0; background-image: linear-gradient(to right, var(--border) 1px, transparent 1px), linear-gradient(to bottom, var(--border) 1px, transparent 1px); background-size: 80px 80px; opacity: 0.4; }
    .brand-hero-inner { position: relative; z-index: 1; display: flex; align-items: flex-start; gap: 48px; }
    .brand-monogram { width: 100px; height: 100px; background: var(--white); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--teal); flex-shrink: 0; letter-spacing: -1px; }
    .brand-hero-text { flex: 1; }
    .brand-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--teal); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .brand-eyebrow::before { content: ''; display: block; width: 24px; height: 1px; background: var(--teal); }
    .brand-name { font-family: 'DM Serif Display', serif; font-size: clamp(36px, 5vw, 64px); letter-spacing: -1.5px; line-height: 1.0; margin-bottom: 16px; }
    .brand-name em { font-style: italic; color: var(--teal); }
    .brand-desc { font-size: 15px; font-weight: 300; line-height: 1.8; color: var(--ink-light); max-width: 560px; margin-bottom: 24px; }
    .brand-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .brand-tag { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 12px; border: 1px solid var(--border); color: var(--ink-light); background: var(--white); }
    .brand-tag.primary { background: var(--teal); color: var(--white); border-color: var(--teal); }
    .brand-hero-stat { position: absolute; right: 64px; bottom: 40px; z-index: 1; text-align: right; }
    .stat-num { font-family: 'DM Serif Display', serif; font-size: 72px; color: var(--border); line-height: 1; }
    .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); }

    /* PRODUCTS SECTION */
    .products-section { padding: 64px 64px 100px; }
    .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .section-title { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -0.5px; }
    .section-title em { font-style: italic; color: var(--teal); }
    .section-note { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); }

    .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); }

    .product-card { background: var(--white); display: flex; flex-direction: column; text-decoration: none; color: inherit; transition: background 0.2s; position: relative; overflow: hidden; opacity: 0; animation: fadeUp 0.5s forwards; }
    .product-card:hover { background: var(--hover-bg); }
    .product-card:hover .product-card-bar { width: 100%; }
    .product-card:hover .product-img { transform: scale(1.03); }
    .product-card-bar { position: absolute; top: 0; left: 0; height: 2px; width: 0; background: var(--teal); transition: width 0.4s ease; }

    .product-img-wrap { aspect-ratio: 1/1; overflow: hidden; background: var(--off-white); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
    .product-img { width: 75%; height: 75%; object-fit: contain; transition: transform 0.4s ease; }
    .product-img-placeholder { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
    .product-img-placeholder svg { width: 40px; height: 40px; stroke: var(--border); fill: none; }

    .product-info { padding: 24px 28px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .product-name { font-family: 'DM Serif Display', serif; font-size: 16px; letter-spacing: -0.3px; line-height: 1.3; }
    .product-brand-sub { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); }

    .product-cta { margin: 0 28px 24px; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--teal); color: var(--white); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; transition: background 0.2s; }
    .product-card:hover .product-cta { background: var(--teal-light); }
    .product-cta-arrow { font-size: 14px; transition: transform 0.2s; }
    .product-card:hover .product-cta-arrow { transform: translate(3px, -3px); }

    /* NO LINK STATE */
    .product-card.no-link { cursor: default; }
    .product-card.no-link .product-cta { background: var(--border); color: var(--ink-faint); }

    /* BACK LINK */
    .back-bar { padding: 24px 64px; border-top: 1px solid var(--border); background: var(--off-white); }
    .back-link { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-light); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s; }
    .back-link:hover { color: var(--teal); }

    /* DISCLOSURE */
    .disclosure { padding: 20px 64px 40px; }
    .disclosure p { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.06em; line-height: 1.8; color: var(--ink-faint); max-width: 700px; }
    .disclosure a { color: var(--teal); text-decoration: none; }

    /* ANIMATION */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .product-card:nth-child(1) { animation-delay: 0.05s; }
    .product-card:nth-child(2) { animation-delay: 0.10s; }
    .product-card:nth-child(3) { animation-delay: 0.15s; }
    .product-card:nth-child(4) { animation-delay: 0.20s; }
    .product-card:nth-child(5) { animation-delay: 0.25s; }
    .product-card:nth-child(6) { animation-delay: 0.30s; }

    /* NOT FOUND */
    .not-found { padding: 120px 64px; text-align: center; }
    .not-found h2 { font-family: 'DM Serif Display', serif; font-size: 36px; margin-bottom: 16px; }
    .not-found p { font-size: 15px; color: var(--ink-light); margin-bottom: 32px; }
    .not-found a { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white); background: var(--teal); padding: 12px 24px; text-decoration: none; display: inline-block; }

    @media (max-width: 900px) {
      nav { padding: 0 24px; }
      .nav-links { display: none; }
      .brand-hero, .products-section, .breadcrumb, .back-bar, .disclosure { padding-left: 24px; padding-right: 24px; }
      .brand-hero-inner { flex-direction: column; gap: 24px; }
      .brand-hero-stat { display: none; }
      .products-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .products-grid { grid-template-columns: 1fr; }
    }
  </style>

    // RENDER

    function getBrandKey() {
      const params = new URLSearchParams(window.location.search);
      return params.get('brand') || '';
    }

    function renderBrand(key) {
      const brand = BRANDS[key];
      const container = document.getElementById('page-content');

      if (!brand) {
        container.innerHTML = `
          <div class="not-found">
            <h2>Brand not found</h2>
            <p>We couldn't find the brand you're looking for.</p>
            <a href="brand-directory.html">← Back to Brand Directory</a>
          </div>`;
        document.title = 'Brand Not Found — Well Rested Skincare';
        return;
      }

      document.title = `${brand.name} — Well Rested Skincare`;

      const isDevice = brand.type === 'device';
      const productCount = brand.products.length;

      const tagsHTML = brand.tags.map((t, i) =>
        `<span class="brand-tag${i === 0 ? ' primary' : ''}">${t}</span>`
      ).join('');

      const productsHTML = brand.products.map(p => {
        const imgSrc = `images/products/${p.img}`;
        const imgTag = `<img class="product-img" src="${imgSrc}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="product-img-placeholder" style="display:none">
            <svg viewBox="0 0 24 24" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>`;

        return `
        <a class="product-card${p.link ? '' : ' no-link'}" ${p.link ? `href="${p.link}" target="_blank" rel="nofollow sponsored noopener"` : ''}>
          <div class="product-card-bar"></div>
          <div class="product-img-wrap">${imgTag}</div>
          <div class="product-info">
            <div class="product-brand-sub">${brand.shortName}</div>
            <div class="product-name">${p.name}</div>
          </div>
          <div class="product-cta">
            <span>${p.link ? 'Shop on Amazon' : 'Coming Soon'}</span>
            <span class="product-cta-arrow">${p.link ? '↗' : '—'}</span>
          </div>
        </a>`;
      }).join('');

      container.innerHTML = `
        <div class="breadcrumb">
          <a href="index.html">Home</a>
          <span class="breadcrumb-sep">/</span>
          <a href="brand-directory.html">Brands</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">${brand.shortName}</span>
        </div>

        <section class="brand-hero">
          <div class="brand-hero-grid"></div>
          <div class="brand-hero-inner">
            <div class="brand-monogram">${brand.monogram}</div>
            <div class="brand-hero-text">
              <div class="brand-eyebrow">${brand.eyebrow}</div>
              <h1 class="brand-name">${brand.name.replace(/(\s)(\S+)$/, '$1<em>$2</em>')}</h1>
              <p class="brand-desc">${brand.descFull}</p>
              <div class="brand-tags">${tagsHTML}</div>
            </div>
          </div>
          <div class="brand-hero-stat">
            <div class="stat-num">${String(productCount).padStart(2, '0')}</div>
            <div class="stat-label">Featured ${isDevice ? 'Devices' : 'Products'}</div>
          </div>
        </section>

        <section class="products-section">
          <div class="section-header">
            <h2 class="section-title">Featured <em>${isDevice ? 'Devices' : 'Products'}</em></h2>
            <span class="section-note">Affiliate links · Amazon ${isDevice ? '& Direct' : ''}</span>
          </div>
          <div class="products-grid">
            ${productsHTML}
          </div>
        </section>

        <div class="back-bar">
          <a href="brand-directory.html" class="back-link">← Back to All Brands</a>
        </div>

        <div class="disclosure">
          <p>This page contains affiliate links. As an Amazon Associate and affiliate partner, Well Rested Skincare earns from qualifying purchases at no extra cost to you. <a href="affiliate-disclosure.html">Read our full disclosure →</a></p>
        </div>
      `;
    }

    renderBrand(getBrandKey());
  </script>
